<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d1526;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00D9FF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#00D9FF;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#00D9FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="120" fill="url(#bgGrad)"/>
  <!-- Grid lines horizontal -->
  <line x1="0" y1="20" x2="900" y2="20" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="40" x2="900" y2="40" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="60" x2="900" y2="60" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="100" x2="900" y2="100" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Grid lines vertical -->
  <line x1="90" y1="0" x2="90" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="270" y1="0" x2="270" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="630" y1="0" x2="630" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="810" y1="0" x2="810" y2="120" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Corner brackets -->
  <path d="M20,10 L10,10 L10,25" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="1.5" fill="none"/>
  <path d="M880,10 L890,10 L890,25" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="1.5" fill="none"/>
  <path d="M20,110 L10,110 L10,95" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="1.5" fill="none"/>
  <path d="M880,110 L890,110 L890,95" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="1.5" fill="none"/>
  <!-- Title -->
  <text x="450" y="52" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#00D9FF" text-anchor="middle" letter-spacing="3">pratham.sharma.systems</text>
  <!-- Subtitle -->
  <text x="450" y="78" font-family="'Courier New', monospace" font-size="11" fill="#00D9FF" text-anchor="middle" letter-spacing="4" opacity="0.7">BUILDING SYSTEMS  •  FULLSTACK  •  AI</text>
  <!-- Glow line bottom -->
  <rect x="0" y="113" width="900" height="1" fill="url(#glowLine)" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="114" width="900" height="1" fill="url(#glowLine)" opacity="0.3"/>
</svg>
