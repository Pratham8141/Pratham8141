<svg width="100%" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#001F2F"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="160" fill="url(#bg)" />

  <!-- grid -->
  <g stroke="#00D9FF" stroke-opacity="0.08">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
  </g>

  <!-- animated glow line -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#00D9FF" stroke-width="2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </line>

</svg>
