<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1520;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Outer background -->
  <rect width="900" height="380" rx="6" fill="url(#cardsBg)" stroke="#00D9FF" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Section label -->
  <text x="24" y="36" font-family="'Courier New', monospace" font-size="14" fill="#00D9FF" font-weight="700" letter-spacing="1">🚀 deployed.systems</text>

  <!-- ── ROW 1 ── -->

  <!-- CARD 1: salez -->
  <rect x="20" y="55" width="415" height="130" rx="6" fill="url(#cardGrad)" stroke="#7c3aed" stroke-opacity="0.7" stroke-width="1.5"/>
  <rect x="20" y="55" width="415" height="3" rx="2" fill="#7c3aed" opacity="0.6"/>
  <!-- icon: 2x2 grid of squares -->
  <rect x="38" y="73" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.9"/>
  <rect x="52" y="73" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="38" y="87" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="52" y="87" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.3"/>
  <!-- title -->
  <text x="72" y="86" font-family="'Courier New', monospace" font-size="15" fill="#a78bfa" font-weight="700">salez</text>
  <!-- divider -->
  <line x1="38" y1="107" x2="417" y2="107" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <!-- description -->
  <text x="38" y="126" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">multi-tenant saas crm</text>
  <text x="38" y="144" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">async workflows</text>

  <!-- CARD 2: food delivery -->
  <rect x="451" y="55" width="430" height="130" rx="6" fill="url(#cardGrad)" stroke="#ea580c" stroke-opacity="0.7" stroke-width="1.5"/>
  <rect x="451" y="55" width="430" height="3" rx="2" fill="#ea580c" opacity="0.6"/>
  <!-- icon: stacked rectangles (burger layers) -->
  <rect x="469" y="72" width="30" height="7" rx="2" fill="#fb923c" opacity="0.9"/>
  <rect x="472" y="83" width="24" height="7" rx="2" fill="#fb923c" opacity="0.7"/>
  <rect x="475" y="94" width="18" height="7" rx="2" fill="#fb923c" opacity="0.5"/>
  <!-- title -->
  <text x="508" y="86" font-family="'Courier New', monospace" font-size="15" fill="#fb923c" font-weight="700">food delivery</text>
  <!-- divider -->
  <line x1="469" y1="107" x2="873" y2="107" stroke="#ea580c" stroke-opacity="0.3" stroke-width="1"/>
  <!-- description -->
  <text x="469" y="126" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">fullstack ordering</text>
  <text x="469" y="144" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">state management</text>

  <!-- ── ROW 2 ── -->

  <!-- CARD 3: realtime chat -->
  <rect x="20" y="205" width="415" height="130" rx="6" fill="url(#cardGrad)" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="20" y="205" width="415" height="3" rx="2" fill="#00D9FF" opacity="0.4"/>
  <!-- icon: chat bubble -->
  <rect x="38" y="223" width="28" height="20" rx="5" fill="none" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <path d="M42,243 L38,250 L50,243" fill="none" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- title -->
  <text x="76" y="238" font-family="'Courier New', monospace" font-size="15" fill="#00D9FF" font-weight="700">realtime chat</text>
  <!-- divider -->
  <line x1="38" y1="257" x2="417" y2="257" stroke="#00D9FF" stroke-opacity="0.2" stroke-width="1"/>
  <!-- description -->
  <text x="38" y="276" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">websocket infra</text>
  <text x="38" y="294" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">presence + reactions</text>

  <!-- CARD 4: pdf toolkit -->
  <rect x="451" y="205" width="215" height="130" rx="6" fill="url(#cardGrad)" stroke="#16a34a" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="451" y="205" width="215" height="3" rx="2" fill="#16a34a" opacity="0.5"/>
  <!-- icon: document with lines -->
  <rect x="469" y="222" width="22" height="28" rx="2" fill="none" stroke="#4ade80" stroke-opacity="0.8" stroke-width="1.5"/>
  <line x1="474" y1="230" x2="486" y2="230" stroke="#4ade80" stroke-opacity="0.7" stroke-width="1.2"/>
  <line x1="474" y1="236" x2="486" y2="236" stroke="#4ade80" stroke-opacity="0.7" stroke-width="1.2"/>
  <line x1="474" y1="242" x2="483" y2="242" stroke="#4ade80" stroke-opacity="0.7" stroke-width="1.2"/>
  <!-- title -->
  <text x="500" y="238" font-family="'Courier New', monospace" font-size="15" fill="#4ade80" font-weight="700">pdf toolkit</text>
  <!-- divider -->
  <line x1="469" y1="257" x2="658" y2="257" stroke="#16a34a" stroke-opacity="0.25" stroke-width="1"/>
  <!-- description -->
  <text x="469" y="276" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">document processing</text>
  <text x="469" y="294" font-family="'Courier New', monospace" font-size="11" fill="#7a8fa0">automation</text>

  <!-- CARD 5: synapse ai -->
  <rect x="682" y="205" width="199" height="130" rx="6" fill="url(#cardGrad)" stroke="#d97706" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="682" y="205" width="199" height="3" rx="2" fill="#d97706" opacity="0.5"/>
  <!-- icon: neural dots -->
  <circle cx="702" cy="232" r="5" fill="none" stroke="#fbbf24" stroke-opacity="0.9" stroke-width="1.5"/>
  <circle cx="702" cy="248" r="5" fill="none" stroke="#fbbf24" stroke-opacity="0.9" stroke-width="1.5"/>
  <circle cx="718" cy="240" r="5" fill="none" stroke="#fbbf24" stroke-opacity="0.6" stroke-width="1.5"/>
  <line x1="707" y1="232" x2="713" y2="240" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="707" y1="248" x2="713" y2="240" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1"/>
  <!-- title -->
  <text x="730" y="238" font-family="'Courier New', monospace" font-size="13" fill="#fbbf24" font-weight="700">synapse ai</text>
  <!-- divider -->
  <line x1="700" y1="257" x2="873" y2="257" stroke="#d97706" stroke-opacity="0.25" stroke-width="1"/>
  <!-- description -->
  <text x="700" y="276" font-family="'Courier New', monospace" font-size="10" fill="#7a8fa0">llm interface</text>
  <text x="700" y="292" font-family="'Courier New', monospace" font-size="10" fill="#7a8fa0">streaming responses</text>
</svg>
