<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#112233;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="6" fill="url(#archBg)" stroke="#00D9FF" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Section label -->
  <text x="24" y="28" font-family="'Courier New', monospace" font-size="13" fill="#00D9FF" font-weight="700" letter-spacing="1">⚡ architecture</text>
  <!-- NODE: CLIENT -->
  <rect x="40" y="60" width="90" height="80" rx="6" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Person icon -->
  <circle cx="85" cy="88" r="10" fill="none" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <path d="M68,108 Q85,96 102,108" fill="none" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <text x="85" y="128" font-family="'Courier New', monospace" font-size="9" fill="#00D9FF" text-anchor="middle" opacity="0.9" letter-spacing="1">CLIENT</text>
  <!-- Arrow 1 -->
  <line x1="131" y1="100" x2="168" y2="100" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="168,95 178,100 168,105" fill="#00D9FF" opacity="0.6"/>
  <!-- NODE: API GATEWAY -->
  <rect x="178" y="60" width="100" height="80" rx="6" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="228" cy="88" r="10" fill="none" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <path d="M218,88 L238,88" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <path d="M218,84 L238,84" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <path d="M218,92 L238,92" stroke="#00D9FF" stroke-opacity="0.8" stroke-width="1.5"/>
  <text x="228" y="122" font-family="'Courier New', monospace" font-size="8.5" fill="#00D9FF" text-anchor="middle" opacity="0.9" letter-spacing="0.5">API GATEWAY</text>
  <!-- Arrow 2 -->
  <line x1="279" y1="100" x2="316" y2="100" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="316,95 326,100 316,105" fill="#00D9FF" opacity="0.6"/>
  <!-- NODE: SERVICE LAYER -->
  <rect x="326" y="55" width="100" height="90" rx="6" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="340" y="75" width="72" height="14" rx="2" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="340" y="93" width="72" height="14" rx="2" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1"/>
  <text x="376" y="122" font-family="'Courier New', monospace" font-size="8.5" fill="#00D9FF" text-anchor="middle" opacity="0.9" letter-spacing="0.3">SERVICE</text>
  <text x="376" y="134" font-family="'Courier New', monospace" font-size="8.5" fill="#00D9FF" text-anchor="middle" opacity="0.9" letter-spacing="0.3">LAYER</text>
  <!-- Arrow 3 -->
  <line x1="427" y1="100" x2="464" y2="100" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="464,95 474,100 464,105" fill="#00D9FF" opacity="0.6"/>
  <!-- NODE: QUEUE -->
  <rect x="474" y="60" width="90" height="80" rx="6" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="492" y="82" width="54" height="10" rx="2" fill="none" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="1"/>
  <rect x="492" y="96" width="54" height="10" rx="2" fill="none" stroke="#00D9FF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="519" y="128" font-family="'Courier New', monospace" font-size="9" fill="#00D9FF" text-anchor="middle" opacity="0.9" letter-spacing="1">QUEUE</text>
  <!-- Arrow 4 -->
  <line x1="565" y1="100" x2="602" y2="100" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="602,95 612,100 602,105" fill="#00D9FF" opacity="0.6"/>
  <!-- NODE: WORKER -->
  <rect x="612" y="60" width="90" height="80" rx="6" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="632" y="80" width="50" height="30" rx="2" fill="none" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="1"/>
  <line x1="644" y1="88" x2="670" y2="88" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="644" y1="94" x2="670" y2="94" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="644" y1="100" x2="660" y2="100" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1"/>
  <text x="657" y="128" font-family="'Courier New', monospace" font-size="9" fill="#00D9FF" text-anchor="middle" opacity="0.9" letter-spacing="1">WORKER</text>
  <!-- Vertical downward arrows from SERVICE -->
  <line x1="376" y1="146" x2="376" y2="160" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="371,160 376,168 381,160" fill="#00D9FF" opacity="0.3"/>
  <!-- Bottom row: DATABASE, CACHE, STORAGE -->
  <!-- DATABASE -->
  <rect x="280" y="165" width="90" height="28" rx="4" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="325" y="183" font-family="'Courier New', monospace" font-size="8" fill="#00D9FF" text-anchor="middle" opacity="0.7" letter-spacing="1">DATABASE</text>
  <!-- CACHE -->
  <rect x="380" y="165" width="90" height="28" rx="4" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="425" y="183" font-family="'Courier New', monospace" font-size="8" fill="#00D9FF" text-anchor="middle" opacity="0.7" letter-spacing="1">CACHE</text>
  <!-- STORAGE -->
  <rect x="480" y="165" width="90" height="28" rx="4" fill="url(#boxGrad)" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="525" y="183" font-family="'Courier New', monospace" font-size="8" fill="#00D9FF" text-anchor="middle" opacity="0.7" letter-spacing="1">STORAGE</text>
</svg>
