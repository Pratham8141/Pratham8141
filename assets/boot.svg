<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">

  <style>
    .text {
      font-family: monospace;
      fill: #00D9FF;
      font-size: 16px;
    }
  </style>

  <rect width="100%" height="100%" fill="#0D1117"/>

  <text x="10" y="30" class="text">
    <tspan>booting pratham.sharma...</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
  </text>

  <text x="10" y="55" class="text">
    <tspan>loading modules: saas, chat, ai...</tspan>
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.5s" fill="freeze"/>
  </text>

  <text x="10" y="80" class="text">
    <tspan>initializing real-time systems...</tspan>
    <animate attributeName="opacity" values="0;1" begin="1s" dur="0.5s" fill="freeze"/>
  </text>

  <text x="10" y="105" class="text">
    <tspan>redis: online</tspan>
    <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </text>

  <text x="10" y="130" class="text">
    <tspan>websocket: active</tspan>
    <animate attributeName="opacity" values="0;1" begin="2s" dur="0.5s" fill="freeze"/>
  </text>

  <text x="10" y="155" class="text">
    <tspan>system ready.</tspan>
    <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.5s" fill="freeze"/>
  </text>

</svg>
