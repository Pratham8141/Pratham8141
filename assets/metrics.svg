<svg width="900" height="58" viewBox="0 0 900 58" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120"/>
      <stop offset="100%" style="stop-color:#0d1628"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#00D9FF;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#00D9FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="58" rx="6" fill="url(#mbg)" stroke="#00D9FF" stroke-opacity="0.18" stroke-width="1"/>
  <!-- left bracket -->
  <path d="M16,12 L8,12 L8,24" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
  <path d="M16,46 L8,46 L8,34" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
  <!-- right bracket -->
  <path d="M884,12 L892,12 L892,24" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
  <path d="M884,46 L892,46 L892,34" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
  <!-- pulse dot -->
  <circle cx="30" cy="29" r="4" fill="#00ff88" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- label -->
  <text x="44" y="34" font-family="Courier New,monospace" font-size="13" fill="#00D9FF" font-weight="700" letter-spacing="2">github.live — Pratham8141</text>
  <!-- right status -->
  <text x="820" y="34" font-family="Courier New,monospace" font-size="11" fill="#00ff88" opacity="0.85">[ LIVE ]</text>
  <!-- bottom glow line -->
  <rect x="0" y="55" width="900" height="1" fill="url(#gl)" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
